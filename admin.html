<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Investigaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="max-w-4xl mx-auto p-8">
        <header class="mb-10 flex justify-between items-center border-b pb-4 border-gray-200">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Panel de Control</h1>
                <p class="text-gray-500">Gestión exclusiva del portafolio científico</p>
            </div>
            <a href="index.html" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-md transition duration-200 text-sm">
                Ver Sitio Público →
            </a>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-10 border border-gray-200">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Registrar Nueva Investigación</h2>
            <form id="formulario-investigacion" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Título del Proyecto</label>
                    <input type="text" id="titulo" required class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Autor / Investigador</label>
                        <input type="text" id="autor" required class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Línea de Investigación</label>
                        <input type="text" id="linea" required class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Resumen Académico</label>
                    <textarea id="resumen" rows="3" required class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"></textarea>
                </div>
                
                <div class="border-t pt-4">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Archivo / Imagen (PDF o JPG/PNG)</label>
                    <input type="file" id="archivo" accept="image/*,.pdf" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded-md transition duration-200 mt-4">
                    Guardar Publicación
                </button>
            </form>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-4">Administrar Publicaciones Actuales</h2>
        <div id="lista-investigaciones" class="space-y-6">
            </div>
    </div>

    <script>
        const API_URL = 'https://portafolio-investigaciones.onrender.com/investigaciones/';
        
        // Cargar las investigaciones en el panel de administración
        async function cargarInvestigaciones() {
            try {
                const respuesta = await fetch(API_URL);
                const datos = await respuesta.json();
                const contenedor = document.getElementById('lista-investigaciones');
                
                if (datos.length === 0) {
                    contenedor.innerHTML = '<p class="text-center text-gray-500">No hay proyectos en la base de datos.</p>';
                    return;
                }

                contenedor.innerHTML = datos.map(inv => `
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-amber-500 flex justify-between items-start gap-4">
                        <div class="flex-1">
                            <h2 class="text-xl font-semibold text-gray-800">${inv.titulo}</h2>
                            <p class="text-sm text-gray-500 italic">Autor: ${inv.autor} | Línea: ${inv.linea_investigacion}</p>
                            <p class="mt-2 text-gray-600 text-sm line-clamp-2">${inv.resumen}</p>
                            ${inv.archivo_url ? `<a href="${inv.archivo_url}" target="_blank" class="text-blue-600 text-sm hover:underline mt-2 inline-block">📎 Ver archivo adjunto</a>` : ''}
                        </div>
                        <button onclick="eliminarInvestigacion(${inv.id})" class="bg-red-50 hover:bg-red-100 text-red-600 hover:text-red-700 p-2 rounded-md transition duration-200 text-sm font-semibold border border-red-200">
                            Eliminar
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error al conectar con la API:", error);
            }
        }

        // Enviar la petición DELETE a la API
        async function eliminarInvestigacion(id) {
            if (confirm('¿Estás seguro de que deseas eliminar permanentemente esta investigación?')) {
                try {
                    const respuesta = await fetch(`${API_URL}${id}`, {
                        method: 'DELETE'
                    });

                    if (respuesta.ok) {
                        cargarInvestigaciones();
                    } else {
                        alert('No se pudo eliminar la investigación');
                    }
                } catch (error) {
                    console.error("Error al eliminar:", error);
                }
            }
        }

        // Capturar formulario y enviar mediante POST con FormData
        document.getElementById('formulario-investigacion').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('titulo', document.getElementById('titulo').value);
            formData.append('autor', document.getElementById('autor').value);
            formData.append('resumen', document.getElementById('resumen').value);
            formData.append('linea_investigacion', document.getElementById('linea').value);
            
            const archivoInput = document.getElementById('archivo');
            if (archivoInput.files.length > 0) {
                formData.append('file', archivoInput.files[0]);
            }

            try {
                const respuesta = await fetch(API_URL, {
                    method: 'POST',
                    body: formData 
                });

                if (respuesta.ok) {
                    document.getElementById('formulario-investigacion').reset();
                    cargarInvestigaciones();
                    alert('Investigación subida con éxito');
                } else {
                    alert('Hubo un error al guardar la investigación');
                }
            } catch (error) {
                console.error("Error al guardar:", error);
            }
        });

        // Carga inicial
        cargarInvestigaciones();
    </script>
</body>
</html>
