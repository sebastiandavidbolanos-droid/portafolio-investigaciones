<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio de Investigación - María Eugenia Londoño</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="max-w-4xl mx-auto p-8">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-blue-900">Mis Investigaciones</h1>
            <p class="text-gray-600 mt-2">Portal de producción académica y científica</p>
        </header>

        <div class="mb-8 bg-white p-4 rounded-lg shadow-sm border border-gray-100">
            <label class="block text-sm font-semibold text-gray-600 mb-2">Filtrar Investigaciones</label>
            <input type="text" id="buscador" placeholder="Escribe un título, autor o línea de investigación..." class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 bg-gray-50">
        </div>

        <h2 class="text-2xl font-bold text-blue-900 mb-4">Proyectos Publicados</h2>
        <div id="lista-investigaciones" class="space-y-6">
            </div>
    </div>

    <script>
        const API_URL = 'https://portafolio-investigaciones.onrender.com/investigaciones/';
        let todasLasInvestigaciones = [];

        // Cargar las investigaciones desde la API
        async function cargarInvestigaciones() {
            try {
                const respuesta = await fetch(API_URL);
                todasLasInvestigaciones = await respuesta.json();
                renderizarLista(todasLasInvestigaciones);
            } catch (error) {
                console.error("Error al conectar con la API:", error);
            }
        }

        // Renderizar las tarjetas sin controles de administración
        function renderizarLista(datos) {
            const contenedor = document.getElementById('lista-investigaciones');
            
            if (datos.length === 0) {
                contenedor.innerHTML = '<p class="text-center text-gray-500">No se encontraron investigaciones.</p>';
                return;
            }

            contenedor.innerHTML = datos.map(inv => `
                <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-600 transition hover:shadow-lg">
                    <h2 class="text-2xl font-semibold text-blue-800">${inv.titulo}</h2>
                    <p class="text-sm text-gray-500 italic mt-1">Autor: ${inv.autor} | Línea: ${inv.linea_investigacion}</p>
                    <p class="mt-4 text-gray-700 leading-relaxed">${inv.resumen}</p>
                    
                    ${inv.archivo_url ? `
                        <div class="mt-5 pt-4 border-t border-gray-100">
                            <img src="${inv.archivo_url}" alt="Imagen adjunta del proyecto" class="w-full h-auto max-h-96 object-cover rounded-md shadow-sm mb-4" onerror="this.style.display='none'">
                            <a href="${inv.archivo_url}" target="_blank" class="inline-block bg-blue-50 text-blue-700 hover:bg-blue-100 font-semibold py-2 px-4 rounded-md transition duration-200 text-sm border border-blue-200">
                                📄 Abrir archivo completo
                            </a>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Filtro en tiempo real
        document.getElementById('buscador').addEventListener('input', (e) => {
            const termino = e.target.value.toLowerCase();
            const filtradas = todasLasInvestigaciones.filter(inv => {
                return inv.titulo.toLowerCase().includes(termino) || 
                       inv.autor.toLowerCase().includes(termino) || 
                       inv.linea_investigacion.toLowerCase().includes(termino);
            });
            renderizarLista(filtradas);
        });

        // Carga inicial al abrir la página
        cargarInvestigaciones();
    </script>
</body>
</html>
